<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Bento</title>

<style>
body {
    margin: 0;
    background: url("assets/lab_background.png") center/cover no-repeat fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
}

#game-container {
    background-color: rgba(0, 0, 0, 0.6);
    padding: 15px;
    border-radius: 10px;
}

#game-board {
    border: 4px solid #fff;
    background: #000;
}

</style>
</head>

<body>
<div id="game-container">
    <h1>Dr. BENTO</h1>
    <p>PONTUAÇÃO: <span id="score">0</span></p>
    <canvas id="game-board" width="200" height="275"></canvas>

    <img src="assets/scientist.gif" width="80">
</div>

<script>
const canvas = document.getElementById("game-board");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

const COLS = 8;
const ROWS = 11;
const CELL = 25;

let score = 0;
let speed = 3000;
let board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

let lastTime = 0;
let dropCounter = 0;
let gameOver = false;

const pills = {
    red: "assets/red.png",
    blue: "assets/blue.png",
    yellow: "assets/yellow.png",
    virus_red: "assets/virus_red.gif",
    virus_blue: "assets/virus_blue.gif",
    virus_yellow: "assets/virus_yellow.gif"
};

let currentPill;
const imageCache = {};

function preloadImages() {
    let total = Object.keys(pills).length;
    let loaded = 0;

    function done() {
        loaded++;
        if (loaded === total) initGame();
    }

    for (const key in pills) {
        const img = new Image();
        img.onload = done;
        img.onerror = done; // prevents game from freezing
        img.src = pills[key];
        imageCache[key] = img;
    }
}

function createPill() {
    const colors = ["red","blue","yellow"];
    return {
        x: Math.floor(COLS/2),
        y: 0,
        color: colors[Math.floor(Math.random()*3)],
        type: "pill"
    };
}

function isValidMove(x,y){
    return x>=0 && x<COLS && y>=0 && y<ROWS && !board[y][x];
}

function movePill(dx,dy){
    if(isValidMove(currentPill.x+dx,currentPill.y+dy)){
        currentPill.x+=dx;
        currentPill.y+=dy;
        return true;
    }
    return false;
}

function lockPill(){
    board[currentPill.y][currentPill.x]=currentPill;
    currentPill=createPill();
    if(!isValidMove(currentPill.x,currentPill.y)) gameOver=true;
}

function drawBlock(block) {
    const key = block.type === 'virus' ? `virus_${block.color}` : block.color;
    const img = imageCache[key];

    if (img && img.complete && img.naturalWidth !== 0) {
        ctx.drawImage(img, block.x * CELL, block.y * CELL, CELL, CELL);
    } else {
        ctx.fillStyle = block.color || "white";
        ctx.fillRect(block.x * CELL, block.y * CELL, CELL, CELL);
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(board[r][c]) drawBlock(board[r][c]);
        }
    }

    if(currentPill) drawBlock(currentPill);
}

function update(time=0){
    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="20px Arial";
        ctx.fillText("GAME OVER",40,130);
        return;
    }

    const delta=time-lastTime;
    lastTime=time;
    dropCounter+=delta;

    if(dropCounter>speed){
        if(!movePill(0,1)) lockPill();
        dropCounter=0;
    }

    draw();
    requestAnimationFrame(update);
}

document.addEventListener("keydown",e=>{
    if(gameOver) return;
    if(e.key==="ArrowLeft") movePill(-1,0);
    if(e.key==="ArrowRight") movePill(1,0);
    if(e.key==="ArrowDown") movePill(0,1);
});

function initGame(){
    currentPill=createPill();
    requestAnimationFrame(update);
}

window.onload=preloadImages;
</script>
</body>
</html>
